<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Matval — Hvað á ég að borða þessa viku?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/x-icon" href="/public/logo_cropped.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..800,50..100,0..1&family=Instrument+Sans:wght@400;500;600;700&display=swap');

  :root{
    --font-heading: 'Fraunces', Georgia, serif;
    --font-body: 'Instrument Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    --paper:#F6F1E6;
    --ink:#1F2A24;
    --moss:#3F5D45;
    --moss-dark:#2E4534;
    --rust:#C5512E;
    --gold:#E0A93A;
    --line:#D8CFBE;
    --card:#FFFDF7;
    --muted:#7A7367;
    --radius: 12px;
    --header-height:79px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  html{ overflow-x:hidden; }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight:400;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x:hidden;
  }
  h1,h2,h3,.display,.logo-text,.hero-title,.section-title{
    font-family: var(--font-heading);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .mono{ font-family: var(--font-body); font-variant-numeric: tabular-nums; }

  a{ color: var(--moss-dark); }

  /* Layout */
  .wrap{ max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  header.site{
    border-bottom: 1px solid var(--line);
    padding: 18px 0;
  }
  header.site .wrap{
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    line-height: 1;
  }

  .logo-image-only img {
    height: 46px;
    width: auto;
    display: block;
    object-fit: contain;
  }

  header.site {
    border-bottom: 1px solid var(--line);
    padding: 16px 0;
  }

  header.site .wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  nav.steps{ display:none; gap:6px; font-family:var(--font-body); font-size:0.78rem; font-weight:600; color: var(--muted); }
  nav.steps span{ padding:4px 10px; border-radius:99px; border:1px solid var(--line); opacity:0.68; }
  nav.steps span.active{
    background: var(--moss); color: var(--paper); border-color: var(--moss-dark);
    opacity:1; box-shadow:0 6px 16px -12px rgba(31,42,36,0.75);
  }
  .mobile-progress{ display:none !important; }
  .mobile-progress-text{
    font-family:var(--font-body); font-size:0.76rem; font-weight:600; color:var(--moss-dark);
    margin-bottom:7px;
  }
  .mobile-progress-track{
    height:4px; border-radius:999px; background:var(--line); overflow:hidden;
  }
  .mobile-progress-fill{
    height:100%; width:0; border-radius:999px; background:var(--moss);
    transition:width .2s ease;
  }
  .header-link{
    border:1px solid var(--line); background:transparent; color:var(--ink);
    border-radius:999px; padding:7px 14px; font-family:var(--font-body);
    font-weight:600; cursor:pointer;
  }

  /* Hero */
  .hero{
    min-height:auto;
    padding:72px 0 56px;
    display:block;
  }
  .hero .eyebrow{
    font-family:var(--font-body); font-size:0.8rem; font-weight:600;
    color: var(--rust); text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 14px;
  }
  .hero h1{
    font-weight:750;
    font-size: clamp(2.4rem, 6vw, 4.4rem);
    line-height: 1.04;
    max-width: 14ch;
  }
  .hero h1 .accent{ color: var(--moss); font-style: italic; }
  .hero p.lead{
    margin-top: 22px; font-size: 1.15rem; max-width: 46ch; color:#3B453E;
  }
  .hero-grid{
    width:100%;
    display:grid; grid-template-columns: 1.1fr 0.9fr; gap: 48px; align-items:center;
  }
  @media (max-width: 860px){ .hero-grid{ grid-template-columns: 1fr; } }
  @media (min-width: 900px){
    .hero{
      min-height:calc(100dvh - var(--header-height));
      padding:0;
      display:flex;
      align-items:center;
    }
  }

  .cta-row{ margin-top: 32px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .btn{
    font-family:var(--font-body); font-weight:600; font-size:1rem;
    border-radius: 999px; padding: 14px 28px; border:2px solid var(--moss);
    background: var(--moss); color: var(--paper); cursor:pointer;
    transition: transform .15s ease, background .15s ease, color .15s ease;
    min-height: 48px;
  }
  .btn.secondary{ background: transparent; color: var(--moss-dark); }
  .btn.ghost{ border-color: var(--line); background: transparent; color: var(--ink); }
  .btn.rust{ background: var(--rust); border-color: var(--rust); color: var(--paper); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }

  .hero-note{ margin-top: 14px; font-size: 0.88rem; color: var(--muted); }

  /* Receipt — signature element */
  .receipt{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px 26px;
    font-family:var(--font-body);
    font-size: 0.9rem;
    box-shadow: 0 24px 60px -28px rgba(31,42,36,0.35);
    transform: rotate(1.5deg);
    position: relative;
  }
  .receipt::before, .receipt::after{
    content:""; position:absolute; left:0; right:0; height:10px;
    background: repeating-linear-gradient(45deg, var(--paper) 0 6px, transparent 6px 12px);
  }
  .receipt::before{ top:-5px; }
  .receipt::after{ bottom:-5px; transform: scaleY(-1); }
  .receipt h3{ font-family:var(--font-heading); font-size:1.2rem; text-align:center; margin-bottom:4px; }
  .receipt .sub{ text-align:center; color:var(--muted); font-size:0.75rem; margin-bottom:16px; }
  .receipt .row{ display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dotted var(--line); }
  .receipt .row span:first-child{ min-width:0; padding-right:12px; }
  .receipt .row span:last-child{ flex-shrink:0; }
  .receipt .row.total{ border-bottom:none; border-top:2px solid var(--ink); margin-top:8px; padding-top:12px; font-weight:700; font-size:1.05rem; }
  .receipt .row .item-meta{ color: var(--muted); font-size:0.78rem; }
  .receipt .barcode{
    margin-top:18px; height:36px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 2px, transparent 2px 5px);
    opacity:0.85;
  }

  /* Section generic */
  section{ padding: 56px 0; }
  section.alt{ background: var(--card); border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .section-head{ max-width: 640px; margin-bottom: 36px; }
  .section-head .eyebrow{
    font-family:var(--font-body); font-size:0.78rem; font-weight:600; color:var(--rust);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px;
  }
  .section-head h2{ font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight:700; }
  .section-head p{ margin-top: 12px; color:#3B453E; }
  .plan-title-row{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:4px;
  }
  .plan-title-row h2{ margin:0; }
  .plan-stats{
    margin-top:8px; color:var(--muted); font-size:0.92rem;
    font-family:var(--font-body); font-weight:500;
  }

  /* Quiz / form */
  .quiz-card{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
    padding: 36px; max-width: 720px; margin: 0 auto;
  }
  .quiz-body{ min-width:0; }
  .quiz-inline-progress{ margin-bottom:18px; }
  .quiz-inline-progress-text{
    font-family:var(--font-body);
    font-size:0.78rem;
    font-weight:600;
    color:var(--muted);
    margin-bottom:8px;
  }
  .quiz-inline-progress-track{
    width:100%;
    height:4px;
    border-radius:999px;
    background:var(--line);
    overflow:hidden;
  }
  .quiz-inline-progress-fill{
    height:100%;
    width:100%;
    border-radius:999px;
    background:var(--moss);
    transform-origin:left center;
    transform:scaleX(var(--progress-ratio, 0));
    transition:transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .quiz-step-label{ font-family:var(--font-body); font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:6px; }
  .quiz-card h3{ font-size:1.5rem; margin-bottom: 18px; }
  .option-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap:10px; margin-bottom: 24px; }
  .compact-option-grid{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .option{
    border:1px solid var(--line); border-radius: 10px; padding: 14px 16px;
    cursor:pointer; background: var(--paper); font-size:0.95rem;
    transition: border-color .15s, background .15s, transform .1s;
    display:flex; align-items:center; gap:10px;
    min-width:0;
  }
  .option.selected{ border-color: var(--moss); background: rgba(63,93,69,0.08); font-weight:600; }
  .ui-icon{
    width:20px;
    height:20px;
    object-fit:contain;
    display:inline-block;
    vertical-align:middle;
    flex-shrink:0;
  }
  .option-icon{
    width:24px;
    height:24px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .option-icon .ui-icon{
    width:22px;
    height:22px;
  }
  .people-icons{
    display:inline-flex;
    align-items:center;
    gap:2px;
    min-width:28px;
  }
  .people-icons .people-icon{
    width:15px;
    height:15px;
    object-fit:contain;
  }
  .mobile-result-tab .ui-icon,
  .result-tab .ui-icon{
    width:20px;
    height:20px;
    margin-right:6px;
  }
  .result-tab-icon{
    width:20px;
    height:20px;
    object-fit:contain;
    flex-shrink:0;
  }
  .option-card,
  .mobile-result-tab,
  .result-tab{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .leftover-note .ui-icon,
  .meta-row .ui-icon,
  .recipe-price .ui-icon{
    width:17px;
    height:17px;
    margin-right:5px;
  }
  .recipe-placeholder-ui-icon{
    width:34px;
    height:34px;
  }
  .option .store-logo{
    width:28px;
    height:28px;
    object-fit:contain;
    flex-shrink:0;
  }
  .scope-controls{ display:grid; gap:16px; }
  .scope-presets{ display:flex; gap:8px; flex-wrap:wrap; }
  .week-selector{
    display:grid;
    grid-template-columns:repeat(7, minmax(0, 1fr));
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    background:var(--paper);
    position:relative;
    z-index:0;
  }
  .day-cell{
    min-height:58px;
    border:0;
    border-right:1px solid var(--line);
    background:transparent;
    background-clip:padding-box;
    color:var(--ink);
    font-family:var(--font-body);
    font-weight:600;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    transition:background .15s ease, color .15s ease;
  }
  .day-cell:last-child{ border-right:0; }
  .day-cell:first-child{
    border-top-left-radius:10px;
    border-bottom-left-radius:10px;
  }

  .day-cell:last-child{
    border-top-right-radius:10px;
    border-bottom-right-radius:10px;
  }
  .day-cell-check{
    width:16px;
    height:16px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .day-check-icon{
    width:14px;
    height:14px;
    opacity:0;
    object-fit:contain;
  }
  .day-cell.selected{
    background:rgba(63,93,69,0.1);
    color:var(--moss-dark);
    box-shadow:none;
  }
  .day-cell.selected .day-check-icon{ opacity:1; }
  .meal-selector{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:8px;
  }
  .scope-helper{
    color:var(--muted);
    font-size:0.84rem;
    margin:10px 0 0;
  }

  .quiz-nav{ display:flex; justify-content:space-between; margin-top: 28px; align-items:center; }
  .quiz-progress{ font-family:var(--font-body); font-size:0.78rem; font-weight:600; color:var(--muted); }

  input[type=number], input[type=text]{
    font-family:var(--font-body); font-size:1rem; padding:12px 14px;
    border:1px solid var(--line); border-radius:8px; background:var(--paper); width:100%;
  }
  .budget-display{
    font-family:var(--font-heading); font-size: 2.4rem; font-weight:700; text-align:center; margin: 18px 0;
    color: var(--moss-dark);
  }
  input[type=range]{ width:100%; accent-color: var(--moss); }

  .pantry-input-row{ display:flex; gap:10px; margin-bottom:14px; }
  .pantry-tags{ display:flex; flex-wrap:wrap; gap:8px; }
  .pantry-tag{
    background: var(--moss); color:var(--paper); border-radius:999px; padding:6px 14px;
    border:0; cursor:pointer; font-family:var(--font-body);
    font-size:0.85rem; display:flex; align-items:center; gap:8px;
  }
  .pantry-tag button,
  .pantry-remove-mark{ background:none; border:none; color:var(--paper); cursor:pointer; font-size:1rem; line-height:1; padding:0; }
  .pantry-suggestions{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .pantry-suggestions .option{ padding: 8px 14px; font-size:0.85rem; }

  /* Results */
  .mobile-only-result{ display:none; }
  .results-summary{
    display:grid; grid-template-columns: 1.2fr 1fr; gap: 32px; margin-bottom: 48px; align-items:start;
  }
  @media (max-width: 860px){ .results-summary{ grid-template-columns: 1fr; } }

  .day-card{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
    padding: 22px; margin-bottom: 18px;
  }
  .day-card h3{
    font-size:1.3rem; display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 12px;
  }
  .day-card h3 .daynum{ font-family:var(--font-body); font-size:0.8rem; font-weight:600; color:var(--rust); }
  .meal-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: 10px 0; border-top:1px dotted var(--line); gap: 16px;
  }
  .meal-row:first-of-type{ border-top:none; }
  .meal-row .meal-type{ font-family:var(--font-body); font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); width:110px; flex-shrink:0; padding-top:3px; }
  .meal-row .meal-name{ font-weight:600; cursor:pointer; }
  .meal-row .meal-tags{ font-size:0.78rem; color: var(--muted); margin-top:2px; }
  .meal-actions{ display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .meal-action-btn{
    border:1px solid var(--line); background:var(--paper); color:var(--ink);
    border-radius:8px; padding:5px 9px; font-family:var(--font-body);
    font-size:0.78rem; cursor:pointer;
  }
  .meal-action-btn.danger{ color:var(--rust); }
  .mobile-result-tabs,
  .mobile-day-tabs{ display:none; }
  .mobile-result-panel{ display:none; }
  .mobile-grocery-summary{ display:none; }
  .saved-stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:22px; }
  .stat-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px; }
  .stat-card span{ display:block; color:var(--muted); font-size:0.82rem; margin-bottom:6px; }
  .stat-card strong{ font-family:var(--font-heading); font-size:1.35rem; font-weight:700; color:var(--moss-dark); }
  .saved-plan-list{ display:grid; gap:14px; margin-bottom:48px; }
  .saved-plan-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; display:flex; justify-content:space-between; gap:18px; align-items:flex-start;
  }
  .saved-plan-card h3{ font-size:1.25rem; margin-bottom:6px; }
  .saved-plan-meta{ color:var(--muted); font-size:0.88rem; }
  .saved-plan-actions{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .btn.saved{ background:var(--moss-dark); color:var(--paper); }
  .save-toast{
    display:inline-flex; align-items:center; min-height:36px; margin:0 0 16px;
    padding:8px 12px; border-radius:10px; background:rgba(63,93,69,0.10);
    color:var(--moss-dark); font-family:var(--font-body); font-size:0.9rem; font-weight:700;
    border:1px solid rgba(63,93,69,0.18);
  }
  @media (max-width: 760px){ .saved-plan-card{ flex-direction:column; } .saved-plan-actions{ justify-content:flex-start; } }
  .leftover-note{
    font-size:0.8rem; color: var(--moss-dark); margin-top:8px; padding:8px 12px;
    background: rgba(63,93,69,0.07); border-radius:6px; font-family:var(--font-body); font-weight:600;
  }

  .shopping-list{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius); padding: 24px;
  }
  .shopping-list h3{ font-size:1.3rem; margin-bottom: 4px; }
  .shopping-source-note{ color:var(--muted); font-size:0.82rem; margin-bottom:14px; }
  .shopping-group{ margin-top:18px; }
  .shopping-group:first-of-type{ margin-top:14px; }
  .shopping-group-title{
    color:var(--moss-dark); font-size:0.76rem; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase; margin-bottom:6px;
  }
  .shopping-item{
    display:grid; grid-template-columns:22px minmax(0,1fr) auto; gap:10px;
    align-items:start; padding:10px 0; border-bottom:1px dotted var(--line);
  }
  .shopping-check{
    appearance:none; width:18px; height:18px; border:1.5px solid var(--line);
    border-radius:5px; background:var(--paper); margin:2px 0 0; cursor:pointer;
  }
  .shopping-check:checked{ background:var(--moss); border-color:var(--moss); }
  .shopping-check:checked::after{
    content:""; display:block; width:5px; height:9px; margin:2px 0 0 5px;
    border:solid var(--paper); border-width:0 2px 2px 0; transform:rotate(45deg);
  }
  .shopping-item-main{ min-width:0; display:block; }
  .shopping-item-name{
    display:block; color:var(--ink); font-weight:600; line-height:1.22;
    overflow-wrap:anywhere;
  }
  .shopping-item-meta{
    display:block; color:var(--muted); font-size:0.8rem; line-height:1.25; margin-top:3px;
  }
  .shopping-badge{
    display:inline-block; color:var(--rust); font-weight:700;
  }
  .shopping-item-price{
    color:var(--ink); font-weight:700; white-space:nowrap; text-align:right; line-height:1.2;
    padding-top:1px;
  }
  .shopping-list .row{
    display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dotted var(--line);
    font-size:0.95rem;
    gap:12px;
  }
  .shopping-list .row > span:first-child{ min-width:0; overflow-wrap:anywhere; }
  .shopping-list .row > span:last-child{ flex-shrink:0; text-align:right; }
  .shopping-list .row span.qty{ color: var(--muted); font-family:var(--font-body); font-size:0.85rem; font-weight:500; }
  .shopping-list .total-row{
    display:flex; justify-content:space-between; padding-top:16px; margin-top:8px;
    border-top:2px solid var(--ink); font-family:var(--font-heading); font-size:1.4rem; font-weight:700;
  }
  .budget-bar{
    height:10px; border-radius:99px; background: var(--line); margin: 14px 0; overflow:hidden;
  }
  .budget-bar-fill{ height:100%; background: var(--moss); border-radius:99px; transition: width .4s ease; }
  .budget-bar-fill.over{ background: var(--rust); }
  .budget-note{ font-size:0.85rem; color: var(--muted); }

  /* Recipe modal */
  .modal-overlay{
    position:fixed; inset:0; background: rgba(31,42,36,0.5);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:100;
  }
  .modal{
    background: var(--paper); border-radius: var(--radius); max-width: 680px; width:100%;
    max-height: 88vh; overflow-y:auto; padding:0; position:relative;
    border:1px solid var(--line); box-shadow:0 28px 70px -38px rgba(31,42,36,0.55);
  }
  .modal .close{
    position:absolute; top:12px; right:12px; background:rgba(255,253,247,0.92);
    border:1px solid rgba(216,207,190,0.85); border-radius:999px; width:36px; height:36px;
    display:flex; align-items:center; justify-content:center; font-size:1.35rem;
