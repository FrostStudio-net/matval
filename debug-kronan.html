<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Krónan API debug</title>
<style>
  body{
    margin:0;
    padding:32px;
    background:#f6f1e6;
    color:#1f2a24;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main{ max-width:1100px; margin:0 auto; }
  h1{ margin:0 0 8px; }
  button{
    border:1px solid #2e4534;
    background:#3f5d45;
    color:#fffdf7;
    padding:10px 16px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
  }
  .summary{ color:#7a7367; margin-bottom:20px; }
  .card{
    background:#fffdf7;
    border:1px solid #d8cfbe;
    border-radius:8px;
    padding:18px;
    margin:16px 0;
  }
  .status{ font-weight:700; }
  .ok{ color:#2e4534; }
  .fail{ color:#b23822; }
  code, pre{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  pre{
    white-space:pre-wrap;
    overflow:auto;
    background:#1f2a24;
    color:#fffdf7;
    padding:14px;
    border-radius:6px;
    font-size:13px;
  }
  dl{
    display:grid;
    grid-template-columns:150px 1fr;
    gap:8px 12px;
    margin:12px 0;
  }
  dt{ color:#7a7367; }
  dd{ margin:0; overflow-wrap:anywhere; }
</style>
</head>
<body>
<main>
  <h1>Krónan API debug</h1>
  <p class="summary">Raw verification only. No meal plan logic, no product matching logic.</p>
  <button id="runBtn">Keyra Krónan API próf</button>
  <p id="cooldownNote" class="summary"></p>
  <div id="output" class="summary" style="margin-top:18px;">Bíð eftir keyrslu.</div>
</main>

<script>
const output = document.getElementById("output");
const runBtn = document.getElementById("runBtn");
const cooldownNote = document.getElementById("cooldownNote");
const DEBUG_CACHE_KEY = "matval.kronanDebug.cache.v1";
const DEBUG_429_KEY = "matval.kronanDebug.blockedUntil.v1";
const DEBUG_COOLDOWN_MS = 60_000;
const DEBUG_429_COOLDOWN_MS = 10 * 60_000;

function pretty(value) {
  return JSON.stringify(value, null, 2);
}

function readJson(key) {
  try {
    return JSON.parse(localStorage.getItem(key) || "null");
  } catch (_error) {
    return null;
  }
}

function writeJson(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function secondsRemaining(until) {
  return Math.max(0, Math.ceil((Number(until || 0) - Date.now()) / 1000));
}

function cachedDebug() {
  const cached = readJson(DEBUG_CACHE_KEY);
  if (!cached || !cached.body || !cached.timestamp) return null;
  return cached;
}

function renderDebugBody(body, cached = false) {
  output.innerHTML = `
    <p class="summary">${cached ? "Sýni cache-aða niðurstöðu." : "Ný live keyrsla."} Base URL: <code>${body.baseUrl}</code> · Generated: <code>${body.generatedAt}</code></p>
    ${body.results.map(renderResult).join("")}
  `;
}

function contains429(body) {
  return (body?.results || []).some((result) => Number(result.status) === 429);
}

function updateCooldownUi() {
  const blockedRemaining = secondsRemaining(localStorage.getItem(DEBUG_429_KEY));
  if (blockedRemaining > 0) {
    runBtn.disabled = true;
    cooldownNote.textContent = `Krónan svaraði með 429. Live köll eru stöðvuð tímabundið. Reyndu aftur eftir um ${Math.ceil(blockedRemaining / 60)} mín.`;
    return;
  }

  const cached = cachedDebug();
  const cooldownRemaining = cached ? secondsRemaining(cached.timestamp + DEBUG_COOLDOWN_MS) : 0;
  runBtn.disabled = cooldownRemaining > 0;
  cooldownNote.textContent = cooldownRemaining > 0
    ? `Cooldown virkur til að forðast spam. Reyndu aftur eftir ${cooldownRemaining} sek.`
    : "Live kall er aðeins keyrt þegar þú smellir á hnappinn.";
}

function renderResult(result) {
  return `
    <section class="card">
      <h2>${result.label}</h2>
      <dl>
        <dt>Request URL</dt><dd><code>${result.requestUrl}</code></dd>
        <dt>Method</dt><dd><code>${result.method}</code></dd>
        <dt>Status</dt><dd class="status ${result.ok ? "ok" : "fail"}">${result.status ?? "network error"} ${result.ok ? "OK" : "FAILED"}</dd>
        <dt>Error</dt><dd>${result.error ? `<code>${result.error}</code>` : "None"}</dd>
      </dl>
      <h3>Response headers</h3>
      <pre>${pretty(result.responseHeaders)}</pre>
      <h3>Response body JSON</h3>
      <pre>${pretty(result.responseBody)}</pre>
    </section>
  `;
}

async function runDebug() {
  const blockedRemaining = secondsRemaining(localStorage.getItem(DEBUG_429_KEY));
  if (blockedRemaining > 0) {
    updateCooldownUi();
    return;
  }

  const cached = cachedDebug();
  if (cached && Date.now() - cached.timestamp < DEBUG_COOLDOWN_MS) {
    renderDebugBody(cached.body, true);
    updateCooldownUi();
    return;
  }

  runBtn.disabled = true;
  output.textContent = "Sæki gögn frá Krónunni...";

  try {
    const response = await fetch("/api/kronan-debug");
    const body = await response.json();
    if (!response.ok) {
      if (response.status === 429) {
        localStorage.setItem(DEBUG_429_KEY, String(Date.now() + DEBUG_429_COOLDOWN_MS));
      }
      output.innerHTML = `
        <section class="card">
          <h2>Debug endpoint failed</h2>
          <dl>
            <dt>Status</dt><dd class="status fail">${response.status}</dd>
            <dt>Error</dt><dd><code>${body.error || "Unknown error"}</code></dd>
          </dl>
          <pre>${pretty(body)}</pre>
        </section>
      `;
      return;
    }

    writeJson(DEBUG_CACHE_KEY, { timestamp: Date.now(), body });
    if (contains429(body)) {
      localStorage.setItem(DEBUG_429_KEY, String(Date.now() + DEBUG_429_COOLDOWN_MS));
      output.innerHTML = `
        <section class="card">
          <h2>Of mörg Krónan köll</h2>
          <p>Krónan svaraði með 429. Ég stöðva live köll tímabundið svo við spömmum ekki API-ið.</p>
        </section>
        ${body.results.map(renderResult).join("")}
      `;
      return;
    }

    renderDebugBody(body, false);
  } catch (error) {
    output.innerHTML = `
      <section class="card">
        <h2>Browser request failed</h2>
        <pre>${error.stack || error.message || String(error)}</pre>
      </section>
    `;
  } finally {
    updateCooldownUi();
  }
}

runBtn.addEventListener("click", runDebug);
const initialCache = cachedDebug();
if (initialCache) renderDebugBody(initialCache.body, true);
updateCooldownUi();
window.setInterval(updateCooldownUi, 1000);
</script>
</body>
</html>
